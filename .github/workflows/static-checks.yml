name: Static Checks

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Setup safe-chain v1.5.3
        shell: bash
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh -o install-safe-chain.sh
          echo "0107cbbbf90159379756157e902acae512d62ffbd174307e42c5fe9f266792d3  install-safe-chain.sh" | sha256sum -c -
          sh install-safe-chain.sh --ci

      - name: Install dependencies
        run: yarn

      - name: Lint Solidity
        run: yarn lint:sol

      - name: Lint TypeScript
        run: yarn lint:ts

      - name: Format Check Solidity
        run: yarn format:sol

      - name: Format Check TypeScript
        run: yarn format:ts

      - name: Format Check YAML
        run: yarn format:yml

      - name: Build Contracts
        run: yarn build

      - name: Test Contracts
        run: yarn test:unit:parallel --bail --no-compile --disabletracer
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
          MNEMONIC_DEV: ${{ vars.MNEMONIC_DEV }}
          MNEMONIC_PROD: ${{ vars.MNEMONIC_PROD }}
